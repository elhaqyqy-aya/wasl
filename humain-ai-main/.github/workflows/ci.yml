name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  # 1. Lint and Test Job
  test:
    name: Lint & Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        cache: "pip"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libjpeg-dev libopenjp2-7-dev libgirepository1.0-dev

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r humanai_backend/requirements.txt
        pip install pytest pytest-asyncio aiosqlite flake8

    - name: Run Linter (flake8)
      run: |
        cd humanai_backend
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Test Suite
      run: |
        cd humanai_backend
        python -m pytest

  # 2. Build and Push Docker Images
  build-and-push:
    name: Build & Push Docker Images
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry (GHCR)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Backend Image
      uses: docker/build-push-action@v5
      with:
        context: ./humanai_backend
        file: ./humanai_backend/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/backend:latest
          ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

    - name: Build and Push Nginx Image
      uses: docker/build-push-action@v5
      with:
        context: ./infra
        file: ./infra/nginx/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/nginx:latest
          ghcr.io/${{ github.repository }}/nginx:${{ github.sha }}

  # 3. Deploy Job (Template)
  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # This is a standard SSH-based deploy step that pulls the new images and restarts services
    # You can configure SSH_PRIVATE_KEY, SSH_HOST, and SSH_USER secrets in GitHub repository settings.
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        script: |
          cd /opt/humanai/infra
          # Pull the latest changes from git
          git pull origin main
          # Login to registry
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          # Pull latest images and restart container services
          docker-compose pull
          docker-compose up -d --remove-orphans
