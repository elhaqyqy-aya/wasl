events { worker_connections 1024; }

http {
  upstream fastapi {
    server host.docker.internal:8000;  # FastAPI runs outside Docker in local dev
  }

  upstream minio {
    server minio:9000;
  }

  server {
    listen 80;
    server_name localhost;

    # API FastAPI
    location /api/ {
      proxy_pass http://fastapi;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 300;  # long LLM calls timeout support
    }

    # MinIO S3 Documents storage
    location /storage/ {
      proxy_pass http://minio/;
      proxy_set_header Host $http_host;
    }

    # Health check
    location /health {
      return 200 'OK';
      add_header Content-Type text/plain;
    }
  }
}
